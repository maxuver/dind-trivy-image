name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/maxuver/dind-trivy:latest
            ghcr.io/maxuver/dind-trivy:dind-20.10.17-trivy-0.45.0
          build-args: |
            DOCKER_VERSION=20.10.17
            TRIVY_VERSION=0.45.0
